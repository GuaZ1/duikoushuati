version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: shuati-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: shuati
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./shuati-backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./shuati-backend/src/main/resources/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - shuati-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  backend:
    build:
      context: ./shuati-backend
      dockerfile: Dockerfile
    image: shuati-backend:latest
    container_name: shuati-backend
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=${SERVER_PORT:-8080}
      - MYSQL_URL=jdbc:mysql://mysql:3306/shuati?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_unicode_ci
      - MYSQL_USER=${MYSQL_USER:-root}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - WECHAT_APPID=${WECHAT_APPID}
      - WECHAT_SECRET=${WECHAT_SECRET}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./uploads:/app/uploads
    networks:
      - shuati-net
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: shuati-nginx
    ports:
      - "80:80"
    volumes:
      - ./uploads:/usr/share/nginx/html/uploads:ro
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - shuati-net
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  shuati-net:
    driver: bridge

volumes:
  mysql_data:
